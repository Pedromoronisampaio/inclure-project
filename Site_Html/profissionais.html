<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inclure – Profissionais</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="navegacao-completa"></div>

    <div class="principal">
      <div class="topo">
        <h1 class="titulo-sec">Profissionais Especializados</h1>
        <p class="subtitulo">
          Conecte-se com psicólogos, terapeutas e especialistas próximos a você
        </p>
      </div>
      <div class="filtro">
        <div class="busca">
          <input type="text" id="buscaProf" placeholder="Buscar nome..." /><img
            src="https://placehold.co/18x18/888/white?text=B"
            alt="Buscar"
          />
        </div>
        <select class="seletor" id="filtroEmprego">
          <option value="">Emprego</option>
          <option>Psicólogo(a)</option>
          <option>Terapeuta</option>
          <option>Fonoaudiólogo(a)</option>
          <option>Psiquiatra</option>
          <option>Neurologista</option>
          <option>Psicopedagogo(a)</option>
        </select>
        <select class="seletor" id="filtroEspec">
          <option value="">Especialidade</option>
          <option>TEA/Autismo</option>
          <option>TDAH</option>
          <option>Dislexia</option>
          <option>TOC</option>
        </select>
        <button class="btn-filtrar" onclick="filtrarProf()">Filtrar</button>
        <button class="btn-limpar" onclick="limparFiltroProf()">Limpar</button>
      </div>
      <div class="prof-grade" id="gradeProf"></div>
      <div class="ver-mais" id="btnVerMaisProf">
        <button class="btn btn-teal" onclick="verMaisProf()">Ver Mais</button>
      </div>
    </div>
    <div class="modal" id="modalPerfil" onclick="fecharModal(event)">
      <div class="modal-box" id="contModal"></div>
    </div>

    <div id="rodape-completo"></div>

    <script src="script.js"></script>
  </body>
</html>
