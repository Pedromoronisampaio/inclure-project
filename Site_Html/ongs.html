<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inclure – ONGs e Recursos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="navegacao-completa"></div>

    <div class="principal">
      <div class="topo">
        <h1 class="titulo-sec">ONGs e Recursos</h1>
        <p class="subtitulo">
          Encontre organizações e instituições que oferecem suporte para pessoas
          neurodivergentes e suas famílias
        </p>
      </div>
      <div class="aviso">
        <img
          src="https://placehold.co/18x18/2e7d32/white?text=!"
          alt="Aviso"
        />Muitas dessas ONGs oferecem serviços gratuitos para famílias de baixa
        renda. Entre em contato para saber sobre os requisitos de acesso.
      </div>
      <div class="filtro">
        <div class="busca">
          <input type="text" id="buscaOng" placeholder="Buscar ONGs..." /><img
            src="https://placehold.co/18x18/888/white?text=B"
            alt="Buscar"
          />
        </div>
        <select class="seletor" id="filtroEstOng">
          <option value="">Estado</option>
          <option>SP</option>
          <option>RJ</option>
          <option>MG</option>
          <option>RS</option>
          <option>PR</option>
        </select>
        <select class="seletor" id="filtroCondOng">
          <option value="">Condições</option>
          <option>TEA/Autismo</option>
          <option>TDAH</option>
          <option>Dislexia</option>
          <option>TOC</option>
          <option>Múltiplas</option>
        </select>
        <button class="btn-filtrar" onclick="filtrarOngs()">Filtrar</button>
        <button class="btn-limpar" onclick="limparFiltroOngs()">Limpar</button>
      </div>
      <div id="listaOngs" class="ong-grade"></div>
      <div class="ver-mais" id="btnVerMaisOngs">
        <button class="btn btn-teal" onclick="verMaisOngs()">Ver Mais</button>
      </div>
    </div>

    <div id="rodape-completo"></div>

    <script src="script.js"></script>
  </body>
</html>
