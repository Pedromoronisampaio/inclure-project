<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inclure – Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="navegacao-completa"></div>

    <div class="auth">
      <div class="acesso-box">
        <h2>Entrar</h2>
        <div class="campos">
          <input class="campo-input" type="email" placeholder="Email" />
          <input class="campo-input" type="password" placeholder="Senha" />
          <a
            href="index.html"
            class="btn btn-verm"
            style="
              width: 100%;
              justify-content: center;
              padding: 13px;
              font-size: 19px;
            "
            >Entrar</a
          >
          <div class="acesso-link">
            Não tem conta? <a href="cadastro.html">Cadastre-se</a>
          </div>
          <div class="acesso-link">
            <a href="esqueci-senha.html">Esqueci minha senha</a>
          </div>
        </div>
      </div>
    </div>

    <div id="rodape-completo"></div>

    <script src="script.js"></script>
  </body>
</html>
