<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inclure – Recuperar senha</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="navegacao-completa"></div>

    <div class="auth">
      <div class="acesso-box" id="etapa-email">
        <div class="recuperacao-header">
          <img
            src="https://placehold.co/64x64/e8f5e9/2e7d32?text=chave"
            alt="Chave"
            class="recuperacao-icone"
          />
          <h2 class="recuperacao-titulo">
            Esqueci minha senha
          </h2>
          <p class="recuperacao-desc">
            Digite o e-mail cadastrado e enviaremos um link para criar uma nova
            senha.
          </p>
        </div>
        <div class="campos">
          <label class="recuperacao-label">E-mail</label>
          <input
            class="campo-input"
            type="email"
            id="emailRecuperacao"
            placeholder="seu@email.com"
          />
          <div id="msgErroEmail" class="recuperacao-erro" style="display: none">
            Por favor, informe um e-mail válido.
          </div>
          <button
            class="btn btn-verde btn-recuperacao"
            onclick="enviarRecuperacao()"
          >
            Enviar link de recuperação
          </button>
          <div class="acesso-link">
            <a href="login.html">Voltar para o login</a>
          </div>
        </div>
      </div>

      <div class="acesso-box" id="etapa-confirmacao" style="display: none">
        <div class="recuperacao-header-conf">
          <img
            src="https://placehold.co/64x64/e8f5e9/2e7d32?text=email"
            alt="E-mail"
            class="recuperacao-icone-conf"
          />
          <h2 class="recuperacao-titulo-conf">
            E-mail enviado!
          </h2>
          <p class="recuperacao-subtitulo">
            Enviamos um link de recuperação para
          </p>
          <strong id="emailConfirmado" class="email-destaque"></strong>
          <p class="recuperacao-texto-reenvio">
            Não recebeu?
            <span class="link-reenvio" onclick="reenviarEmail()"
              >Reenviar e-mail</span
            >
          </p>
          <div class="acesso-link">
            <a href="login.html">Voltar para o login</a>
          </div>
        </div>
      </div>
    </div>

    <div id="rodape-completo"></div>

    <script src="script.js"></script>
  </body>
</html>
