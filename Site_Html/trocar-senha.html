<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inclure – Recuperar senha</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="navegacao-completa"></div>

    <div class="auth">
      <div class="acesso-box" id="etapa-email">
        <div style="text-align: center; margin-bottom: 20px">
          <img
            src="https://placehold.co/64x64/e8f5e9/2e7d32?text=chave"
            alt="Chave"
            style="border-radius: 50%; margin-bottom: 12px"
          />
          <h2 style="font-size: 27px; font-weight: 700; margin-bottom: 6px">
            Esqueci minha senha
          </h2>
          <p style="font-size: 17px; color: #666; line-height: 1.5">
            Digite o e-mail cadastrado e enviaremos um link para criar uma nova
            senha.
          </p>
        </div>
        <div class="campos">
          <label
            style="
              font-size: 17px;
              font-weight: 600;
              color: #444;
              display: block;
            "
            >E-mail</label
          >
          <input
            class="campo-input"
            type="email"
            id="emailRecuperacao"
            placeholder="seu@email.com"
          />
          <div
            id="msgErroEmail"
            style="
              display: none;
              background: #fff3f3;
              border: 1px solid #ffcdd2;
              border-radius: 8px;
              padding: 10px 14px;
              font-size: 17px;
              color: #c62828;
            "
          >
            Por favor, informe um e-mail válido.
          </div>
          <button
            class="btn btn-verde"
            style="
              width: 100%;
              justify-content: center;
              padding: 13px;
              font-size: 19px;
            "
            onclick="enviarRecuperacao()"
          >
            Enviar link de recuperação
          </button>
          <div class="acesso-link">
            <a href="login.html">Voltar para o login</a>
          </div>
        </div>
      </div>
      <div class="acesso-box" id="etapa-confirmacao" style="display: none">
        <div style="text-align: center">
          <!-- Imagem placeholder substituindo o emoji 📧 -->
          <img
            src="https://placehold.co/64x64/e8f5e9/2e7d32?text=email"
            alt="E-mail"
            style="border-radius: 50%; margin-bottom: 16px"
          />
          <h2 style="font-size: 27px; font-weight: 700; margin-bottom: 8px">
            E-mail enviado!
          </h2>
          <p style="font-size: 17px; color: #666; margin-bottom: 8px">
            Enviamos um link de recuperação para
          </p>
          <strong
            id="emailConfirmado"
            style="font-size: 18px; color: #2e7d32"
          ></strong>
          <p style="font-size: 16px; color: #888; margin: 16px 0">
            Não recebeu?
            <span
              style="
                color: #2e7d32;
                cursor: pointer;
                text-decoration: underline;
              "
              onclick="reenviarEmail()"
              >Reenviar e-mail</span
            >
          </p>
          <div class="acesso-link">
            <a href="login.html">Voltar para o login</a>
          </div>
        </div>
      </div>
    </div>

    <div id="rodape-completo"></div>

    <script src="script.js"></script>
  </body>
</html>
